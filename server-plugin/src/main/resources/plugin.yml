name: EnthusiaServerAutoClicker
main: net.enthusia.autoclicker.server.EnthusiaServerAutoClickerPlugin
version: 1.0.0
api-version: '1.20'
author: P2wn
softdepend:
  - CombatX
commands:
  autoclick:
    description: Toggle or configure the server-side autoclicker.
    usage: /autoclick [ticks|off|status|check <player>|reload]
permissions:
  enthusia.autoclicker.use:
    description: Allows use of the server-side autoclicker.
    default: true
  enthusia.autoclicker.check:
    description: Allows silent server-side checks for detectable client mod signals.
    default: op
  enthusia.autoclicker.admin:
    description: Allows reloading the server-side autoclicker configuration.
    default: op
